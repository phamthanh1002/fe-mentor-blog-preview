<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./style.css">

  <title>Frontend Mentor | Blog preview card</title>
</head>

<body>
  <main>
    <article class="card">
      <img src="./assets/images/illustration-article.svg" alt="Illustration" class="card__image">

      <span class="card__status">Learning</span>

      <time datetime="2023-12-21" class="card__date">Published 21 Dec 2023</time>

      <h3 class="card__title">
        <a href="#">HTML & CSS foundations</a>
      </h3>

      <p class="card__content">These languages are the backbone of every website, defining structure, content, and
        presentation.</p>

      <div class="card__author">
        <img src="./assets/images/image-avatar.webp" alt="Author Avatar" class="card__author-avatar">
        <p class="card__author-name">Greg Hooper</p>
      </div>
    </article>
  </main>
</body>

</html>
